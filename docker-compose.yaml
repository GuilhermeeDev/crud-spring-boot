services:
  crud-springboot:
    image: crud-springboot:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    
  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_DB: CrudDatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"